
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="index.css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inkflow — Documentation Collaboration</title>

    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f1115;
            color: #e6e6e6;
            min-height: 100vh;
    

        }

        
        .navbar {
            position: absolute;   /* makes it sit on top of hero */
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: transparent;   /* remove black look */
            border-bottom: none;       /* remove bottom line */
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #7aa2ff;
            letter-spacing: 1px;
        }

        .nav-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .login-btn {
            padding: 8px 16px;
            border: 1px solid #2a2f3a;
            border-radius: 6px;
            background: transparent;
            color: #e6e6e6;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #1a1d24;
        }

        
        .signup-wrapper {
            position: relative;
        }

        .login-wrapper {
            position: relative;
        }

        .signup-btn {
            padding: 10px 18px;
            border-radius: 6px;
            background: #7aa2ff;
            color: #0f1115;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .dropdown {
            position: absolute;
            top: 110%;
            right: 0;
            background: #151820;
            border: 1px solid #252a35;
            border-radius: 8px;
            width: 200px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
        }

        .dropdown a {
            padding: 12px 16px;
            text-decoration: none;
            color: #e6e6e6;
            font-size: 14px;
            transition: background 0.2s;
        }

        .dropdown a:hover {
            background: #1f2430;
        }

        /*.signup-wrapper:hover .dropdown {
            display: flex;
        }

        .login-wrapper:hover .dropdown {
            display:flex;
        }*/
  
    </style>
</head>

<body>
    
    <nav class="navbar">
        <div style="font-size: 24px;font-weight: 700;color: #7aa2ff;letter-spacing: 1px; ">Inkflow</div>

        <div class="nav-actions">
          
            
            <button class="login-btn" onclick="goToLogin()">Login</button>
           
        

           
            
            <div class="signup-wrapper">
                <button class="signup-btn" onclick="goToSignup()">Sign Up</button>


                 <!---<div class="dropdown">
                    <a href="#">Manager</a>
                    <a href="#">Team Lead</a>
                    <a href="#">Developer</a>
                </div> --->
            </div>
        </div>
    </nav>

    
    <section class="hero">
        <h1>Documentation that <span>flows</span> with your team</h1>
        <p>
            Inkflow is a collaborative documentation platform built for modern
            tech companies. Write, review, and maintain technical knowledge
            together — clearly, securely, and at scale.
        </p>

        <div class="hero-actions">
            <button class="primary-btn" onclick="goToSignup()">Get Started</button>
            <button class="secondary-btn">Learn More</button>
        </div>
    </section>
    <script>
        function goToLogin(){
            window.location.href = "auth.html#login";
        }
        
        function goToSignup(){
            window.location.href = "auth.html#signup";
        }
        </script>

    
    <footer>
        © 2026 Inkflow. Built for teams that care about great documentation.
    </footer>
</body>
</html>
